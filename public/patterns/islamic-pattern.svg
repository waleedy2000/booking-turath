<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <g fill="none" stroke="#097834" stroke-width="1.2" opacity="0.05">
    <!-- الشبكة الهندسية المتقاطعة -->
    <path d="M50 0 L50 100 M0 50 L100 50" />
    <path d="M0 0 L100 100 M0 100 L100 0" />
    
    <!-- النجمة الثمانية المركزية -->
    <rect x="30" y="30" width="40" height="40" />
    <rect x="30" y="30" width="40" height="40" transform="rotate(45 50 50)" />
    
    <!-- النجوم الثمانية في الزوايا لتكتمل عند تكرار النمط -->
    <rect x="-20" y="-20" width="40" height="40" />
    <rect x="-20" y="-20" width="40" height="40" transform="rotate(45 0 0)" />
    
    <rect x="80" y="-20" width="40" height="40" />
    <rect x="80" y="-20" width="40" height="40" transform="rotate(45 100 0)" />
    
    <rect x="-20" y="80" width="40" height="40" />
    <rect x="-20" y="80" width="40" height="40" transform="rotate(45 0 100)" />
    
    <rect x="80" y="80" width="40" height="40" />
    <rect x="80" y="80" width="40" height="40" transform="rotate(45 100 100)" />
    
    <!-- دوائر ترابط الفن الإسلامي -->
    <circle cx="50" cy="50" r="18" />
    <circle cx="0" cy="0" r="28" />
    <circle cx="100" cy="0" r="28" />
    <circle cx="0" cy="100" r="28" />
    <circle cx="100" cy="100" r="28" />
  </g>
</svg>
